<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RoboDog Control</title>
<style>
:root{--bg:#0e1116;--card:#171c24;--card2:#1e2530;--ink:#eef2f8;--muted:#93a0b4;--line:#2a323f;
 --amber:#ffb454;--amber2:#ff9a3c;--steel:#5cc8ff;--good:#57d977;--bad:#ff5c6c;--r:14px;
 --mono:ui-monospace,Menlo,Consolas,monospace;--sans:Inter,-apple-system,Segoe UI,Roboto,sans-serif}
*{box-sizing:border-box}html,body{margin:0}body{background:radial-gradient(1200px 600px at 50% -10%,rgba(255,180,84,.08),transparent),var(--bg);
 color:var(--ink);font:15px/1.5 var(--sans);min-height:100vh}
main{max-width:1080px;margin:0 auto;padding:20px 16px 60px}
header{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:6px}
.logo{font-size:30px}h1{font-size:22px;margin:0;letter-spacing:.3px}
.sub{color:var(--muted);font-size:13px;margin:0 0 16px}
.pill{display:inline-flex;align-items:center;gap:7px;padding:6px 12px;border-radius:999px;font:700 12px/1 var(--mono);
 background:var(--card2);border:1px solid var(--line)}
.dot{width:9px;height:9px;border-radius:50%;background:var(--bad);box-shadow:0 0 8px var(--bad)}
.pill.on .dot{background:var(--good);box-shadow:0 0 8px var(--good)}
.grid{display:grid;gap:16px;grid-template-columns:1fr 1fr}
@media(max-width:820px){.grid{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px}
.card h2{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin:0 0 12px}
button{font:600 14px/1 var(--sans);color:var(--ink);background:var(--card2);border:1px solid var(--line);
 border-radius:10px;padding:12px 14px;cursor:pointer;transition:.12s;user-select:none}
button:hover:not(:disabled){border-color:var(--amber);color:#fff}button:active:not(:disabled){transform:translateY(1px)}
button:disabled{opacity:.4;cursor:not-allowed}
button.primary{background:linear-gradient(180deg,var(--amber),var(--amber2));color:#231400;border:none}
button.danger{background:#2a1416;border-color:#5a2a2f;color:#ff9aa4}button.danger:hover{border-color:var(--bad);color:#fff}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
select{background:var(--card2);color:var(--ink);border:1px solid var(--line);border-radius:10px;padding:11px;flex:1;min-width:140px}
.dpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:340px;margin:0 auto}
.dpad button{aspect-ratio:1;font-size:20px;display:flex;align-items:center;justify-content:center;padding:0}
.dpad .stop{background:#2a1416;border-color:#5a2a2f;color:#ff8a94;font:800 12px/1 var(--sans)}
.dpad .empty{visibility:hidden}
.actions{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:9px}
.actions button{padding:11px 8px;font-size:13px}
.feed{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px}
.feed button{padding:9px 6px;font-size:12px;background:#1a1710;border-color:#3a3320}
.legs .leg{display:flex;align-items:center;gap:10px;margin:9px 0}.legs label{width:64px;color:var(--muted);font:700 12px/1 var(--mono)}
.legs input[type=range]{flex:1;accent-color:var(--amber)}.legs .val{width:34px;text-align:right;font:700 12px/1 var(--mono);color:var(--amber)}
.log{background:#0a0d12;border:1px solid var(--line);border-radius:10px;padding:10px;height:210px;overflow:auto;
 font:12px/1.5 var(--mono);color:#b9c6d8}
.log .t{color:var(--steel)}.log .c{color:var(--amber)}.log .b{color:#7fe3a0}.log .e{color:var(--bad)}
.full{grid-column:1/-1}
</style></head><body><main>
<header><span class="logo">🐕‍🦺</span><h1>RoboDog Control</h1>
  <span id="statusPill" class="pill"><span class="dot"></span><span id="statusText">Disconnected</span></span></header>
<p class="sub">Rapidpower robot dog · local BLE control · packets shown live in the log</p>

<div class="grid">
  <div class="card full">
    <h2>Connection</h2>
    <div class="row">
      <button class="primary" onclick="scan(false)">🔍 Scan</button>
      <button onclick="scan(true)" title="Show every BLE device nearby, not just the dog">🔍 Scan all</button>
      <select id="devices"><option value="">— scan for devices —</option></select>
      <button class="primary" onclick="connect()">🔗 Connect</button>
      <button class="danger" onclick="disconnect()">Disconnect</button>
      <button onclick="cmd('stop')" style="margin-left:auto">■ STOP</button>
    </div>
  </div>

  <div class="card">
    <h2>Movement</h2>
    <div class="dpad">
      <button class="empty"></button><button data-c onclick="cmd('forward')">▲</button><button class="empty"></button>
      <button data-c onclick="cmd('turn_left')">↺</button><button class="stop" data-c onclick="cmd('stop')">STOP</button><button data-c onclick="cmd('turn_right')">↻</button>
      <button data-c onclick="cmd('left_shift')">◀</button><button data-c onclick="cmd('backward')">▼</button><button data-c onclick="cmd('right_shift')">▶</button>
    </div>
  </div>

  <div class="card">
    <h2>Postures &amp; Tricks</h2>
    <div class="actions" id="actions"></div>
  </div>

  <div class="card">
    <h2>Leg Control</h2>
    <div class="legs" id="legs"></div>
    <button data-c onclick="sendLegs()" style="width:100%;margin-top:8px">Send leg pose</button>
  </div>

  <div class="card">
    <h2>Entertainment</h2>
    <div class="actions" id="fun"></div>
  </div>

  <div class="card">
    <h2>Feed</h2>
    <div class="feed" id="feed"></div>
  </div>

  <div class="card full">
    <h2>Telemetry &amp; Command Log</h2>
    <div class="log" id="log"></div>
  </div>
</div>

<script>
const ACTIONS=[["sit","Sit"],["stand_up","Stand"],["act_cute","Act Cute"],["kung_fu","Kung Fu"],["greet","Greet"],
 ["shake_hand","Shake"],["get_down","Get Down"],["attack","Attack"],["handstand","Handstand"],["surrender","Surrender"],
 ["push_up","Push-up"],["swim","Swim"],["patrol","Patrol"],["pee","Pee"]];
const FUN=[["dance","💃 Dance"],["story","📖 Story"],["music","🎵 Music"],["sleep","😴 Sleep"]];
const FEEDS=[["feed_bone","🦴 Bone"],["feed_water","💧 Water"],["feed_battery","🔋 Battery"],["feed_oil","🛢 Oil"],
 ["feed_gem","💎 Gem"],["feed_ice","🧊 Ice"],["feed_sun","☀️ Sun"],["feed_nucleus","⚛️ Nucleus"]];
let connected=false;
const $=s=>document.querySelector(s);
function log(msg,cls=''){const l=$('#log');const t=new Date().toLocaleTimeString();
 l.insertAdjacentHTML('afterbegin',`<div><span class=t>${t}</span> <span class="${cls}">${msg}</span></div>`);}
function setConn(on,addr){connected=on;$('#statusPill').classList.toggle('on',on);
 $('#statusText').textContent=on?('Connected'+(addr?' · '+addr:'')):'Disconnected';
 document.querySelectorAll('[data-c]').forEach(b=>b.disabled=!on);}
async function api(path,opts){try{const r=await fetch(path,opts);const j=await r.json().catch(()=>({}));
 if(!r.ok)throw new Error(j.detail||r.status);return j;}catch(e){log('✖ '+e.message,'e');throw e;}}
async function scan(all){log(all?'Scanning ALL BLE devices…':'Scanning for the dog…');
 const j=await api('/api/scan'+(all?'?all=true':''),{method:'POST'});
 const sel=$('#devices');sel.innerHTML='';const ds=j.devices||[];
 ds.forEach(d=>{const o=document.createElement('option');o.value=d.address;
  const rssi=d.rssi!=null?` (${d.rssi} dBm)`:'';
  o.textContent=(d.likely_dog?'🐕 ':'')+(d.name||'(no name)')+' — '+d.address+rssi;sel.appendChild(o);});
 if(!ds.length){log(all?'0 devices advertising. Is the dog ON and NOT connected to the phone app?':'No dog found. Try “Scan all”, and make sure the dog is on + the phone app is closed.','e');}
 else{const dogs=ds.filter(d=>d.likely_dog).length;log(`Found ${ds.length} device(s)${dogs?`, ${dogs} likely dog`:''}`,'b');
  const first=ds.findIndex(d=>d.likely_dog);if(first>=0)sel.selectedIndex=first;}}
async function connect(){const addr=$('#devices').value;log('Connecting'+(addr?' to '+addr:' (auto)')+'…');
 const j=await api('/api/connect',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(addr?{address:addr}:{})});
 setConn(true,j.address);log('✔ Connected '+(j.address||''),'b');}
async function disconnect(){await api('/api/disconnect',{method:'POST'});setConn(false);log('Disconnected');}
async function cmd(name){if(!connected&&name!=='stop')return;await api('/api/command/'+name,{method:'POST'});log('▶ '+name,'c');}
async function feed(name){await api('/api/feed/'+name,{method:'POST'});log('🍖 '+name,'c');}
async function sendLegs(){const v=n=>+document.getElementById('leg_'+n).value;
 const body={fl:v('fl'),fr:v('fr'),bl:v('bl'),br:v('br')};
 await api('/api/legs',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
 log('🦵 legs '+JSON.stringify(body),'c');}
// build action + feed + leg controls
$('#actions').innerHTML=ACTIONS.map(([k,l])=>`<button data-c onclick="cmd('${k}')">${l}</button>`).join('');
$('#fun').innerHTML=FUN.map(([k,l])=>`<button data-c onclick="cmd('${k}')">${l}</button>`).join('');
$('#feed').innerHTML=FEEDS.map(([k,l])=>`<button data-c onclick="feed('${k}')">${l}</button>`).join('');
$('#legs').innerHTML=[["fl","Front L"],["fr","Front R"],["bl","Back L"],["br","Back R"]].map(([k,l])=>
 `<div class=leg><label>${l}</label><input type=range id=leg_${k} min=0 max=99 value=50 oninput="document.getElementById('v_${k}').textContent=this.value"><span class=val id=v_${k}>50</span></div>`).join('');
// telemetry websocket
function ws(){const w=new WebSocket((location.protocol==='https:'?'wss://':'ws://')+location.host+'/ws/telemetry');
 w.onmessage=e=>{try{const m=JSON.parse(e.data);if(m.type==='telemetry')log('◀ '+m.data,'b');}catch{}};
 w.onclose=()=>setTimeout(ws,2000);}
ws();
// poll status on load
api('/api/status',{}).then(j=>setConn(j.connected,j.address)).catch(()=>setConn(false));
setConn(false);log('Ready. Scan → Connect → drive.');
</script></main></body></html>
